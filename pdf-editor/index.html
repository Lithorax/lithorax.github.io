<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Studio</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0e14;--panel:#16161e;--panel2:#1c1c28;--border:#272738;
  --accent:#e8b44b;--accent2:#c4953a;--text:#cccce0;--dim:#6868a0;
  --canvas-bg:#13131d;--red:#ef4444;
}
html,body{height:100%;font-family:'DM Mono',monospace;background:var(--bg);color:var(--text);overflow:hidden}
.app{display:grid;grid-template-rows:52px 1fr;height:100vh}

/* ─── TOP BAR ─── */
.topbar{display:flex;align-items:center;gap:10px;padding:0 16px;
  background:var(--panel);border-bottom:1px solid var(--border);z-index:20;flex-shrink:0}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:var(--accent);white-space:nowrap}
.logo em{color:var(--dim);font-style:normal}
.vsep{width:1px;height:20px;background:var(--border);flex-shrink:0}
.fname{font-size:11px;color:var(--dim);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.spacer{flex:1}
.pginfo{font-size:11px;color:var(--dim);white-space:nowrap}
.zrow{display:flex;align-items:center;gap:4px}
.zbtn{background:none;border:1px solid var(--border);color:var(--text);border-radius:5px;
  font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;padding:3px 8px;height:26px;
  display:flex;align-items:center;transition:border-color .15s,color .15s}
.zbtn:hover{border-color:var(--accent);color:var(--accent)}
.zval{font-size:11px;color:var(--dim);min-width:36px;text-align:center}
.btn-dl{background:var(--accent);color:#111;border:none;padding:0 14px;height:30px;border-radius:7px;
  font-family:'DM Mono',monospace;font-size:11px;font-weight:500;cursor:pointer;
  display:flex;align-items:center;gap:5px;transition:background .15s,transform .1s}
.btn-dl:hover:not(:disabled){background:var(--accent2);transform:translateY(-1px)}
.btn-dl:disabled{opacity:.35;cursor:not-allowed}

/* ─── WORKSPACE ─── */
.workspace{display:grid;grid-template-columns:52px 1fr 190px;min-height:0}

/* ─── TOOLBAR ─── */
.toolbar{background:var(--panel);border-right:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;padding:8px 0;gap:2px;overflow-y:auto}
.tg{display:flex;flex-direction:column;align-items:center;gap:2px;padding:0 4px;width:100%}
.tg+.tg{margin-top:6px;padding-top:6px;border-top:1px solid var(--border)}
.tbtn{width:42px;height:42px;background:none;border:1px solid transparent;border-radius:8px;
  color:var(--dim);cursor:pointer;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:2px;transition:all .12s;position:relative}
.tbtn svg{width:16px;height:16px;pointer-events:none}
.tbtn .k{font-size:8px;line-height:1;opacity:.5;pointer-events:none}
.tbtn:hover{background:rgba(255,255,255,.04);color:var(--text);border-color:var(--border)}
.tbtn.on{background:rgba(232,180,75,.12);border-color:var(--accent);color:var(--accent)}
.tbtn::after{content:attr(data-tip);position:absolute;left:48px;top:50%;transform:translateY(-50%);
  background:#252535;color:var(--text);font-size:10px;padding:4px 8px;border-radius:5px;
  white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:300;
  border:1px solid var(--border)}
.tbtn:hover::after{opacity:1}

/* ─── CANVAS AREA ─── */
.canvas-area{background:var(--canvas-bg);overflow:auto;position:relative;
  background-image:radial-gradient(circle,#252540 1px,transparent 1px);background-size:22px 22px}
.canvas-area::-webkit-scrollbar{width:6px;height:6px}
.canvas-area::-webkit-scrollbar-track{background:var(--bg)}
.canvas-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ─── DROP ZONE ─── */
#dropZone{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;cursor:pointer;
  transition:background .2s;user-select:none}
#dropZone.hidden{display:none}
#dropZone.over{background:rgba(232,180,75,.05)}
.drop-icon{width:80px;height:80px;border:2px dashed var(--border);border-radius:16px;
  display:flex;align-items:center;justify-content:center;color:var(--dim);
  transition:all .2s;pointer-events:none}
#dropZone.over .drop-icon{border-color:var(--accent);color:var(--accent)}
.drop-h2{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;pointer-events:none}
.drop-sub{font-size:11px;color:var(--dim);text-align:center;line-height:1.9;pointer-events:none}
.drop-sub b{color:var(--accent);font-weight:400}
.btn-browse{background:var(--accent);color:#111;border:none;padding:9px 22px;border-radius:8px;
  font-family:'DM Mono',monospace;font-size:12px;font-weight:500;cursor:pointer;
  margin-top:2px;transition:background .15s;position:relative;z-index:2}
.btn-browse:hover{background:var(--accent2)}

/* ─── PAGES ─── */
#pages{display:flex;flex-direction:column;align-items:center;padding:28px;gap:24px}
#pages.hidden{display:none}
.pw{position:relative;flex-shrink:0;box-shadow:0 10px 40px rgba(0,0,0,.7)}
.pw canvas{display:block;position:absolute;top:0;left:0}
.pw .base-c{background:#fff}
.pg-lbl{position:absolute;bottom:-20px;left:0;right:0;text-align:center;font-size:10px;color:var(--dim)}
/* cursor classes on annotation canvas */
.ann-c.cur-select{cursor:default}
.ann-c.cur-pen{cursor:crosshair}
.ann-c.cur-text{cursor:text}
.ann-c.cur-highlight{cursor:crosshair}
.ann-c.cur-rect{cursor:crosshair}
.ann-c.cur-eraser{cursor:cell}
.ann-c.cur-move{cursor:move}

/* ─── PROPS ─── */
.props{background:var(--panel);border-left:1px solid var(--border);
  padding:12px;overflow-y:auto;display:flex;flex-direction:column;gap:14px}
.props.muted{opacity:.35;pointer-events:none}
.props::-webkit-scrollbar{width:4px}
.props::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.plabel{font-size:8px;text-transform:uppercase;letter-spacing:1.5px;color:var(--dim);margin-bottom:6px}
.cgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:6px}
.cdot{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .12s}
.cdot:hover,.cdot.on{border-color:#fff;transform:scale(1.15)}
.crow{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-top:3px}
.cname{font-size:10px;color:var(--dim)}
.swatch{width:24px;height:24px;border-radius:5px;border:1px solid var(--border);
  cursor:pointer;position:relative;overflow:hidden}
.swatch input[type=color]{position:absolute;inset:-4px;opacity:0;cursor:pointer;width:200%;height:200%}
/* ─── range + number input row ─── */
.rrow{display:flex;align-items:center;gap:6px}
input[type=range]{flex:1;accent-color:var(--accent);min-width:0}
.numinput{width:46px;background:var(--panel2);border:1px solid var(--border);
  color:var(--text);border-radius:5px;font-family:'DM Mono',monospace;
  font-size:11px;padding:3px 5px;text-align:center;outline:none;flex-shrink:0}
.numinput:focus{border-color:var(--accent)}
/* remove spinner arrows */
.numinput::-webkit-inner-spin-button,.numinput::-webkit-outer-spin-button{-webkit-appearance:none}
.numinput[type=number]{-moz-appearance:textfield}
.psec{display:flex;flex-direction:column}
.guide{font-size:10px;color:var(--dim);line-height:2.1}
.guide b{color:var(--accent);font-weight:400}

/* ─── Selection panel (shown when annotation selected) ─── */
#selPanel{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:10px;
  display:flex;flex-direction:column;gap:8px}
#selPanel.hidden{display:none}
.sel-title{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--dim)}
.sel-btns{display:flex;gap:6px}
.sel-btn{flex:1;background:none;border:1px solid var(--border);color:var(--text);
  border-radius:5px;font-family:'DM Mono',monospace;font-size:10px;padding:5px 0;
  cursor:pointer;transition:all .12s;text-align:center}
.sel-btn:hover{border-color:var(--accent);color:var(--accent)}
.sel-btn.del{border-color:rgba(239,68,68,.4);color:var(--red)}
.sel-btn.del:hover{background:rgba(239,68,68,.1);border-color:var(--red)}

.hidden{display:none!important}

/* ─── Text input overlay ─── */
.tinput{position:fixed;z-index:600;border:1.5px solid var(--accent);outline:none;
  background:rgba(14,14,20,.12);font-family:'DM Mono',monospace;padding:3px 6px;
  min-width:80px;min-height:26px;resize:both;color:#fff;border-radius:3px;
  white-space:pre}

/* ─── Loader ─── */
#loader{position:fixed;inset:0;background:rgba(10,10,18,.85);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:900}
#loader.hidden{display:none}
.spin{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.lmsg{font-size:11px;color:var(--dim)}

/* ─── Toast ─── */
#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(60px);
  background:var(--panel2);border:1px solid var(--border);color:var(--text);
  padding:8px 16px;border-radius:8px;font-size:11px;transition:transform .25s ease;
  z-index:1000;white-space:nowrap;pointer-events:none}
#toast.up{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="logo">PDF<em>Studio</em></div>
    <div class="vsep"></div>
    <div class="fname" id="fname">No file loaded</div>
    <div class="spacer"></div>
    <span class="pginfo hidden" id="pginfo"></span>
    <div class="vsep"></div>
    <div class="zrow">
      <button class="zbtn" id="zOut">−</button>
      <span class="zval" id="zval">100%</span>
      <button class="zbtn" id="zIn">+</button>
      <button class="zbtn" id="zFit">fit</button>
    </div>
    <div class="vsep"></div>
    <button class="btn-dl" id="btnDl" disabled>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Export PDF
    </button>
  </div>

  <!-- WORKSPACE -->
  <div class="workspace">

    <!-- TOOLBAR -->
    <div class="toolbar">
      <div class="tg">
        <button class="tbtn on" id="t-select" data-tip="Select  V">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 3l14 9-7 1-3 7z"/></svg>
          <span class="k">V</span>
        </button>
      </div>
      <div class="tg">
        <button class="tbtn" id="t-text" data-tip="Add / Edit Text  T">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/>
          </svg>
          <span class="k">T</span>
        </button>
        <button class="tbtn" id="t-pen" data-tip="Draw  P">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
          <span class="k">P</span>
        </button>
        <button class="tbtn" id="t-highlight" data-tip="Highlight  H">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="8" width="18" height="10" rx="2"/><line x1="3" y1="4" x2="21" y2="4"/>
          </svg>
          <span class="k">H</span>
        </button>
        <button class="tbtn" id="t-rect" data-tip="Rectangle  R">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
          <span class="k">R</span>
        </button>
      </div>
      <div class="tg">
        <button class="tbtn" id="t-eraser" data-tip="Eraser  E">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 20H7L3 16l9-12 8 10-2 3 2 3z"/></svg>
          <span class="k">E</span>
        </button>
      </div>
      <div class="tg">
        <button class="tbtn" id="t-undo" data-tip="Undo  Ctrl+Z">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/>
          </svg>
          <span class="k">⌘Z</span>
        </button>
      </div>
    </div>

    <!-- CANVAS AREA -->
    <div class="canvas-area" id="canvasArea">
      <!-- Drop zone -->
      <div id="dropZone">
        <div class="drop-icon">
          <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/>
          </svg>
        </div>
        <div class="drop-h2">Drop your PDF here</div>
        <div class="drop-sub">or click below to browse &nbsp;·&nbsp; <b>PDF files only</b></div>
        <button class="btn-browse" id="browseBtn">Choose File</button>
      </div>
      <input type="file" id="fileInput" accept=".pdf,application/pdf" style="display:none">
      <!-- Pages -->
      <div id="pages" class="hidden"></div>
    </div>

    <!-- PROPS PANEL -->
    <div class="props muted" id="props">

      <!-- Selection info panel -->
      <div id="selPanel" class="hidden">
        <div class="sel-title">Selected annotation</div>
        <div class="sel-btns">
          <button class="sel-btn" id="selEditBtn">Edit</button>
          <button class="sel-btn del" id="selDelBtn">Delete</button>
        </div>
      </div>

      <div class="psec">
        <div class="plabel">Color</div>
        <div class="cgrid" id="cgrid"></div>
        <div class="crow">
          <span class="cname">Custom</span>
          <div class="swatch" id="swatchWrap" style="background:#e8b44b">
            <input type="color" id="colorPicker" value="#e8b44b">
          </div>
        </div>
      </div>

      <div class="psec" id="strokeSec">
        <div class="plabel">Stroke Width</div>
        <div class="rrow">
          <input type="range" id="sizeRange" min="1" max="60" value="3">
          <input type="number" id="sizeNum" class="numinput" value="3" min="1" max="200">
        </div>
      </div>

      <div class="psec hidden" id="fontSec">
        <div class="plabel">Font Size</div>
        <div class="rrow">
          <input type="range" id="fontRange" min="6" max="72" value="16">
          <input type="number" id="fontNum" class="numinput" value="16" min="4" max="300">
        </div>
      </div>

      <div class="psec" id="opSec">
        <div class="plabel">Opacity</div>
        <div class="rrow">
          <input type="range" id="opRange" min="10" max="100" value="100">
          <input type="number" id="opNum" class="numinput" value="100" min="10" max="100">
        </div>
      </div>

      <div class="psec" style="margin-top:auto">
        <div class="plabel">Shortcuts</div>
        <div class="guide">
          <b>V</b> select &nbsp;<b>T</b> text<br>
          <b>P</b> draw &nbsp;<b>H</b> highlight<br>
          <b>R</b> rect &nbsp;<b>E</b> erase<br>
          <b>Ctrl+Z</b> undo<br>
          <b>Del</b> delete selected<br>
          <b>+ / −</b> zoom
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Loader -->
<div id="loader" class="hidden">
  <div class="spin"></div>
  <div class="lmsg" id="lmsg">Loading…</div>
</div>
<!-- Toast -->
<div id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════════════════════
   PDF.js worker
═══════════════════════════════════════════════════════════════════ */
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

/* ═══════════════════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════════════════ */
var pjsDoc      = null;
var origBytes   = null;
var pageData    = [];   // {pjsPage, baseCanvas, annCanvas, anns, natW, natH}

var tool        = 'select';
var penColor    = '#e8b44b';
var strokeW     = 3;
var fontSize    = 16;
var opacity     = 1;
var zoomLevel   = 1;

var isDrawing   = false;
var drawStart   = null;
var drawPts     = [];
var activePgIdx = -1;
var undoStack   = [];

// Selection state
var sel = {
  pgIdx : -1,   // which page
  annIdx: -1,   // which annotation index
  dragStartPos: null,     // {x,y} canvas coords when drag began
  origNx: 0, origNy: 0,  // annotation position when drag began
  isDragging: false
};

var PRESET_COLORS = [
  '#ffffff','#e8b44b','#ef4444','#22c55e',
  '#3b82f6','#a855f7','#f97316','#ec4899',
  '#14b8a6','#111111'
];

/* ═══════════════════════════════════════════════════════════════════
   DOM REFS
═══════════════════════════════════════════════════════════════════ */
var dropZone    = document.getElementById('dropZone');
var fileInput   = document.getElementById('fileInput');
var pagesEl     = document.getElementById('pages');
var canvasArea  = document.getElementById('canvasArea');
var propsEl     = document.getElementById('props');
var loaderEl    = document.getElementById('loader');
var lmsgEl      = document.getElementById('lmsg');
var toastEl     = document.getElementById('toast');
var pginfoEl    = document.getElementById('pginfo');
var fnameEl     = document.getElementById('fname');
var zvalEl      = document.getElementById('zval');
var btnDl       = document.getElementById('btnDl');
var colorPicker = document.getElementById('colorPicker');
var swatchWrap  = document.getElementById('swatchWrap');
var sizeRange   = document.getElementById('sizeRange');
var sizeNum     = document.getElementById('sizeNum');
var fontRange   = document.getElementById('fontRange');
var fontNum     = document.getElementById('fontNum');
var opRange     = document.getElementById('opRange');
var opNum       = document.getElementById('opNum');
var cgrid       = document.getElementById('cgrid');
var selPanel    = document.getElementById('selPanel');
var selEditBtn  = document.getElementById('selEditBtn');
var selDelBtn   = document.getElementById('selDelBtn');

/* ═══════════════════════════════════════════════════════════════════
   COLOUR GRID
═══════════════════════════════════════════════════════════════════ */
PRESET_COLORS.forEach(function(c) {
  var d = document.createElement('div');
  d.className = 'cdot' + (c === penColor ? ' on' : '');
  d.style.background = c;
  d.addEventListener('click', function() {
    setColor(c);
    cgrid.querySelectorAll('.cdot').forEach(function(x){ x.classList.remove('on'); });
    d.classList.add('on');
  });
  cgrid.appendChild(d);
});

/* ═══════════════════════════════════════════════════════════════════
   TOOL BUTTONS
═══════════════════════════════════════════════════════════════════ */
['select','text','pen','highlight','rect','eraser'].forEach(function(name) {
  var btn = document.getElementById('t-' + name);
  if (btn) btn.addEventListener('click', function() { setTool(name); });
});
document.getElementById('t-undo').addEventListener('click', doUndo);

/* ═══════════════════════════════════════════════════════════════════
   FILE UPLOAD
═══════════════════════════════════════════════════════════════════ */
document.getElementById('browseBtn').addEventListener('click', function(e) {
  e.stopPropagation();
  fileInput.click();
});
dropZone.addEventListener('click', function(e) {
  if (e.target.id !== 'browseBtn') fileInput.click();
});
fileInput.addEventListener('change', function(e) {
  var f = e.target.files && e.target.files[0];
  if (f) loadPDF(f);
  fileInput.value = '';
});
canvasArea.addEventListener('dragover', function(e) {
  e.preventDefault(); e.stopPropagation();
  if (!dropZone.classList.contains('hidden')) dropZone.classList.add('over');
});
canvasArea.addEventListener('dragleave', function() { dropZone.classList.remove('over'); });
canvasArea.addEventListener('drop', function(e) {
  e.preventDefault(); e.stopPropagation();
  dropZone.classList.remove('over');
  var f = e.dataTransfer.files[0];
  if (f && (f.type === 'application/pdf' || f.name.toLowerCase().endsWith('.pdf'))) {
    loadPDF(f);
  } else {
    showToast('Please drop a PDF file');
  }
});

/* ═══════════════════════════════════════════════════════════════════
   CONTROLS — stroke / font / opacity (range + number synced)
═══════════════════════════════════════════════════════════════════ */
function syncStroke(v) {
  v = Math.max(1, Math.min(200, +v || 1));
  strokeW = v;
  sizeRange.value = Math.min(v, 60);
  sizeNum.value   = v;
}
function syncFont(v) {
  v = Math.max(4, Math.min(300, +v || 8));
  fontSize = v;
  fontRange.value = Math.min(v, 72);
  fontNum.value   = v;
}
function syncOpacity(v) {
  v = Math.max(10, Math.min(100, +v || 100));
  opacity = v / 100;
  opRange.value = v;
  opNum.value   = v;
}
sizeRange.addEventListener('input',  function() { syncStroke(sizeRange.value); });
sizeNum.addEventListener('input',    function() { syncStroke(sizeNum.value); });
sizeNum.addEventListener('change',   function() { syncStroke(sizeNum.value); });
fontRange.addEventListener('input',  function() { syncFont(fontRange.value); });
fontNum.addEventListener('input',    function() { syncFont(fontNum.value); });
fontNum.addEventListener('change',   function() { syncFont(fontNum.value); });
opRange.addEventListener('input',    function() { syncOpacity(opRange.value); });
opNum.addEventListener('input',      function() { syncOpacity(opNum.value); });
opNum.addEventListener('change',     function() { syncOpacity(opNum.value); });

colorPicker.addEventListener('input', function() {
  setColor(colorPicker.value);
  cgrid.querySelectorAll('.cdot').forEach(function(x){ x.classList.remove('on'); });
});
btnDl.addEventListener('click', doExport);
document.getElementById('zIn').addEventListener('click',  function() { adjustZoom(0.25); });
document.getElementById('zOut').addEventListener('click', function() { adjustZoom(-0.25); });
document.getElementById('zFit').addEventListener('click', function() { applyZoom(1); });

/* ─── Selection panel buttons ─── */
selEditBtn.addEventListener('click', function() {
  if (sel.pgIdx < 0 || sel.annIdx < 0) return;
  var a = pageData[sel.pgIdx].anns[sel.annIdx];
  if (a && a.type === 'text') editTextAnn(sel.pgIdx, sel.annIdx);
});
selDelBtn.addEventListener('click', function() { deleteSelected(); });

/* ═══════════════════════════════════════════════════════════════════
   KEYBOARD
═══════════════════════════════════════════════════════════════════ */
document.addEventListener('keydown', function(e) {
  var tag = e.target.tagName.toLowerCase();
  if (tag === 'textarea' || tag === 'input') return;
  var map = {v:'select',t:'text',p:'pen',h:'highlight',r:'rect',e:'eraser'};
  var k = e.key.toLowerCase();
  if (map[k]) setTool(map[k]);
  if ((e.ctrlKey || e.metaKey) && k === 'z') { e.preventDefault(); doUndo(); }
  if (e.key === 'Delete' || e.key === 'Backspace') deleteSelected();
  if (e.key === '+' || e.key === '=') adjustZoom(0.25);
  if (e.key === '-') adjustZoom(-0.25);
  if (e.key === 'Escape') clearSelection();
});

/* ═══════════════════════════════════════════════════════════════════
   LOAD PDF
═══════════════════════════════════════════════════════════════════ */
async function loadPDF(file) {
  showLoader('Loading PDF…');
  try {
    var ab = await file.arrayBuffer();
    origBytes = ab.slice(0);
    pjsDoc = await pdfjsLib.getDocument({ data: new Uint8Array(ab) }).promise;

    fnameEl.textContent = file.name;
    pginfoEl.textContent = pjsDoc.numPages + ' page' + (pjsDoc.numPages > 1 ? 's' : '');
    pginfoEl.classList.remove('hidden');
    btnDl.disabled = false;
    propsEl.classList.remove('muted');

    dropZone.classList.add('hidden');
    pagesEl.classList.remove('hidden');

    pageData  = [];
    undoStack = [];
    clearSelection();
    await renderAllPages();
    hideLoader();
    showToast('Loaded: ' + file.name);
  } catch(err) {
    hideLoader();
    showToast('Could not load PDF — is it a valid file?');
    console.error(err);
  }
}

/* ═══════════════════════════════════════════════════════════════════
   RENDER PAGES
═══════════════════════════════════════════════════════════════════ */
async function renderAllPages() {
  var savedAnns = pageData.map(function(p) {
    return JSON.parse(JSON.stringify(p.anns || []));
  });
  pagesEl.innerHTML = '';
  var areaW = canvasArea.clientWidth - 60;

  for (var i = 1; i <= pjsDoc.numPages; i++) {
    showLoader('Rendering page ' + i + ' / ' + pjsDoc.numPages);
    var page  = await pjsDoc.getPage(i);
    var nat   = page.getViewport({ scale: 1 });
    var scale = Math.min((areaW / nat.width) * zoomLevel, 4);
    var vp    = page.getViewport({ scale: scale });
    var W     = Math.round(vp.width);
    var H     = Math.round(vp.height);

    var pw = document.createElement('div');
    pw.className = 'pw';
    pw.style.width = W + 'px'; pw.style.height = H + 'px';

    var baseCanvas = document.createElement('canvas');
    baseCanvas.className = 'base-c';
    baseCanvas.width = W; baseCanvas.height = H;

    var annCanvas = document.createElement('canvas');
    annCanvas.className = 'ann-c cur-' + tool;
    annCanvas.width = W; annCanvas.height = H;

    var lbl = document.createElement('div');
    lbl.className = 'pg-lbl';
    lbl.textContent = 'Page ' + i;

    pw.append(baseCanvas, annCanvas, lbl);
    pagesEl.appendChild(pw);

    await page.render({ canvasContext: baseCanvas.getContext('2d'), viewport: vp }).promise;

    var idx  = i - 1;
    var anns = savedAnns[idx] ? savedAnns[idx] : [];
    pageData[idx] = { pjsPage: page, baseCanvas: baseCanvas, annCanvas: annCanvas,
                      anns: anns, natW: nat.width, natH: nat.height };
    attachEvents(annCanvas, idx);
    redrawPage(idx);
  }
}

/* ═══════════════════════════════════════════════════════════════════
   EVENTS
═══════════════════════════════════════════════════════════════════ */
function attachEvents(canvas, idx) {
  canvas.addEventListener('mousedown',  function(e) { onDown(e, idx); });
  canvas.addEventListener('mousemove',  function(e) { onMove(e, idx); });
  canvas.addEventListener('mouseup',    function(e) { onUp(e, idx); });
  canvas.addEventListener('mouseleave', function(e) {
    if (isDrawing && activePgIdx === idx) finalise(idx, null);
    if (sel.isDragging) commitDrag(idx);
  });
  canvas.addEventListener('dblclick', function(e) {
    if (tool === 'select' || tool === 'text') {
      var pos = cvPos(e, canvas);
      var hit = hitTest(pos, idx);
      if (hit !== -1 && pageData[idx].anns[hit].type === 'text') {
        editTextAnn(idx, hit);
      }
    }
  });
}

function cvPos(e, canvas) {
  var r  = canvas.getBoundingClientRect();
  var sx = canvas.width  / r.width;
  var sy = canvas.height / r.height;
  return { x: (e.clientX - r.left) * sx, y: (e.clientY - r.top) * sy };
}

/* ── Hit-test: returns annotation index (-1 if none) ── */
function hitTest(pos, pgIdx) {
  var d    = pageData[pgIdx];
  var W    = d.annCanvas.width;
  var H    = d.annCanvas.height;
  var anns = d.anns;
  var HIT  = 14;
  // iterate in reverse so topmost annotation wins
  for (var i = anns.length - 1; i >= 0; i--) {
    var a = anns[i];
    if (a.type === 'path') {
      for (var j = 0; j < a.pts.length; j++) {
        if (Math.hypot(a.pts[j].nx * W - pos.x, a.pts[j].ny * H - pos.y) < HIT + a.nw * W * 0.5) {
          return i;
        }
      }
    } else if (a.type === 'text') {
      var px = a.nfont * W;
      var tx = a.nx * W, ty = a.ny * H;
      var lines = a.text.split('\n');
      var tw = 0;
      // estimate width
      lines.forEach(function(l) { tw = Math.max(tw, l.length * px * 0.6); });
      var th = lines.length * px * 1.3;
      if (pos.x >= tx - 4 && pos.x <= tx + tw + 4 && pos.y >= ty - px - 4 && pos.y <= ty + th) {
        return i;
      }
    } else {
      // highlight or rect
      var rx = a.nx * W, ry = a.ny * H, rw = a.nw * W, rh = a.nh * H;
      if (pos.x >= rx - 4 && pos.x <= rx + rw + 4 && pos.y >= ry - 4 && pos.y <= ry + rh + 4) {
        return i;
      }
    }
  }
  return -1;
}

/* ── Main mouse down ── */
function onDown(e, idx) {
  var pos = cvPos(e, pageData[idx].annCanvas);
  activePgIdx = idx;

  /* ── SELECT TOOL ── */
  if (tool === 'select') {
    var hit = hitTest(pos, idx);
    if (hit !== -1) {
      // Select this annotation
      if (sel.pgIdx !== idx || sel.annIdx !== hit) {
        setSelection(idx, hit);
      }
      // Begin drag
      var a = pageData[idx].anns[hit];
      sel.isDragging    = true;
      sel.dragStartPos  = pos;
      sel.origNx        = a.nx !== undefined ? a.nx : (a.pts ? a.pts[0].nx : 0);
      sel.origNy        = a.ny !== undefined ? a.ny : (a.pts ? a.pts[0].ny : 0);
      pageData[idx].annCanvas.classList.add('cur-move');
    } else {
      // Click on empty → deselect
      clearSelection();
    }
    return;
  }

  /* ── TEXT TOOL: click existing text → edit it, else create new ── */
  if (tool === 'text') {
    var hit2 = hitTest(pos, idx);
    if (hit2 !== -1 && pageData[idx].anns[hit2].type === 'text') {
      editTextAnn(idx, hit2);
    } else {
      spawnTextInput(pos, idx, -1);
    }
    return;
  }

  /* ── ERASER ── */
  if (tool === 'eraser') { eraseAt(pos, idx); return; }

  /* ── DRAWING TOOLS ── */
  isDrawing = true;
  drawStart = pos;
  drawPts   = [pos];
}

function onMove(e, idx) {
  var pos = cvPos(e, pageData[idx].annCanvas);

  /* ── DRAG SELECTED ANNOTATION ── */
  if (sel.isDragging && sel.pgIdx === idx && sel.annIdx >= 0) {
    var d   = pageData[idx];
    var W   = d.annCanvas.width, H = d.annCanvas.height;
    var a   = d.anns[sel.annIdx];
    var dx  = (pos.x - sel.dragStartPos.x) / W;
    var dy  = (pos.y - sel.dragStartPos.y) / H;

    if (a.type === 'path') {
      // Store offset in annotation
      a._dx = dx; a._dy = dy;
    } else {
      a.nx = Math.max(0, sel.origNx + dx);
      a.ny = Math.max(0, sel.origNy + dy);
    }
    redrawPage(idx);
    return;
  }

  if (!isDrawing || activePgIdx !== idx) return;

  if (tool === 'pen') {
    drawPts.push(pos);
    redrawPage(idx);
    drawLiveStroke(idx);
  } else if (tool === 'highlight' || tool === 'rect') {
    redrawPage(idx);
    drawLiveShape(idx, pos);
  }
}

function onUp(e, idx) {
  if (sel.isDragging) { commitDrag(idx); return; }
  if (!isDrawing || activePgIdx !== idx) return;
  var pos = cvPos(e, pageData[idx].annCanvas);
  finalise(idx, pos);
}

/* ── Commit drag offset into actual coordinates ── */
function commitDrag(idx) {
  if (!sel.isDragging) return;
  sel.isDragging = false;
  pageData[idx].annCanvas.classList.remove('cur-move');
  var a = pageData[idx].anns[sel.annIdx];
  if (!a) return;
  if (a.type === 'path' && (a._dx || a._dy)) {
    var dx = a._dx || 0, dy = a._dy || 0;
    a.pts = a.pts.map(function(p) { return { nx: p.nx + dx, ny: p.ny + dy }; });
    delete a._dx; delete a._dy;
    redrawPage(idx);
  }
}

/* ═══════════════════════════════════════════════════════════════════
   FINALISE DRAWING STROKE
═══════════════════════════════════════════════════════════════════ */
function finalise(idx, pos) {
  if (!isDrawing) return;
  isDrawing = false;
  var d = pageData[idx];
  var W = d.annCanvas.width, H = d.annCanvas.height;

  pushUndo(idx);

  if (tool === 'pen' && drawPts.length >= 2) {
    d.anns.push({
      type: 'path',
      pts:  drawPts.map(function(p) { return { nx: p.x/W, ny: p.y/H }; }),
      color: penColor, nw: strokeW/W, opacity: opacity
    });
  } else if (pos && (tool === 'highlight' || tool === 'rect')) {
    var x0 = Math.min(drawStart.x, pos.x), y0 = Math.min(drawStart.y, pos.y);
    var rw  = Math.abs(pos.x - drawStart.x), rh = Math.abs(pos.y - drawStart.y);
    if (rw > 4 && rh > 4) {
      d.anns.push({
        type: tool === 'highlight' ? 'highlight' : 'rect',
        nx: x0/W, ny: y0/H, nw: rw/W, nh: rh/H,
        color: penColor, nstroke: strokeW/W,
        opacity: tool === 'highlight' ? opacity * 0.45 : opacity
      });
    }
  }
  drawPts = []; drawStart = null;
  redrawPage(idx);
}

/* ═══════════════════════════════════════════════════════════════════
   REDRAW
═══════════════════════════════════════════════════════════════════ */
function redrawPage(idx) {
  var d   = pageData[idx];
  var ctx = d.annCanvas.getContext('2d');
  ctx.clearRect(0, 0, d.annCanvas.width, d.annCanvas.height);
  d.anns.forEach(function(a, i) {
    drawAnn(ctx, a, d.annCanvas, sel.pgIdx === idx && sel.annIdx === i);
  });
}

function drawAnn(ctx, a, canvas, selected) {
  var W = canvas.width, H = canvas.height;
  ctx.save();
  ctx.globalAlpha = a.opacity;

  var offX = (a._dx || 0), offY = (a._dy || 0);

  if (a.type === 'path') {
    ctx.strokeStyle = a.color;
    ctx.lineWidth   = a.nw * W;
    ctx.lineCap     = 'round'; ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo((a.pts[0].nx + offX) * W, (a.pts[0].ny + offY) * H);
    for (var i = 1; i < a.pts.length; i++) {
      ctx.lineTo((a.pts[i].nx + offX) * W, (a.pts[i].ny + offY) * H);
    }
    ctx.stroke();
  } else if (a.type === 'text') {
    var px = a.nfont * W;
    ctx.font      = px + 'px DM Mono, monospace';
    ctx.fillStyle = a.color;
    var lines = a.text.split('\n');
    lines.forEach(function(line, li) {
      ctx.fillText(line, a.nx * W, a.ny * H + li * px * 1.3);
    });
  } else if (a.type === 'highlight') {
    ctx.fillStyle = a.color;
    ctx.fillRect(a.nx * W, a.ny * H, a.nw * W, a.nh * H);
  } else if (a.type === 'rect') {
    ctx.strokeStyle = a.color;
    ctx.lineWidth   = Math.max(a.nstroke * W, 0.5);
    ctx.strokeRect(a.nx * W, a.ny * H, a.nw * W, a.nh * H);
  }

  // Draw selection outline
  if (selected) {
    ctx.globalAlpha = 1;
    ctx.strokeStyle = '#4af';
    ctx.lineWidth   = 1.5;
    ctx.setLineDash([4, 3]);
    var bb = getBBox(a, canvas);
    ctx.strokeRect(bb.x - 4, bb.y - 4, bb.w + 8, bb.h + 8);
    ctx.setLineDash([]);
    // Corner handles
    [[bb.x-4,bb.y-4],[bb.x+bb.w+4,bb.y-4],[bb.x-4,bb.y+bb.h+4],[bb.x+bb.w+4,bb.y+bb.h+4]].forEach(function(pt) {
      ctx.fillStyle = '#4af';
      ctx.beginPath(); ctx.arc(pt[0], pt[1], 4, 0, Math.PI*2); ctx.fill();
    });
  }
  ctx.restore();
}

/* Bounding box for any annotation in canvas px */
function getBBox(a, canvas) {
  var W = canvas.width, H = canvas.height;
  var offX = a._dx || 0, offY = a._dy || 0;
  if (a.type === 'path') {
    var xs = a.pts.map(function(p){ return (p.nx+offX)*W; });
    var ys = a.pts.map(function(p){ return (p.ny+offY)*H; });
    var minX = Math.min.apply(null,xs), maxX = Math.max.apply(null,xs);
    var minY = Math.min.apply(null,ys), maxY = Math.max.apply(null,ys);
    return {x:minX,y:minY,w:maxX-minX,h:maxY-minY};
  } else if (a.type === 'text') {
    var px = a.nfont * W;
    var lines = a.text.split('\n');
    var tw = 0; lines.forEach(function(l){ tw = Math.max(tw, l.length * px * 0.6); });
    return {x:a.nx*W, y:(a.ny-a.nfont)*H, w:tw, h:lines.length*px*1.3};
  } else {
    return {x:a.nx*W, y:a.ny*H, w:a.nw*W, h:a.nh*H};
  }
}

function drawLiveStroke(idx) {
  if (drawPts.length < 2) return;
  var ctx = pageData[idx].annCanvas.getContext('2d');
  ctx.save();
  ctx.globalAlpha = opacity;
  ctx.strokeStyle = penColor; ctx.lineWidth = strokeW;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.beginPath(); ctx.moveTo(drawPts[0].x, drawPts[0].y);
  for (var i = 1; i < drawPts.length; i++) ctx.lineTo(drawPts[i].x, drawPts[i].y);
  ctx.stroke(); ctx.restore();
}

function drawLiveShape(idx, pos) {
  var ctx = pageData[idx].annCanvas.getContext('2d');
  var x0  = Math.min(drawStart.x, pos.x), y0 = Math.min(drawStart.y, pos.y);
  var rw  = Math.abs(pos.x - drawStart.x), rh = Math.abs(pos.y - drawStart.y);
  ctx.save();
  if (tool === 'highlight') {
    ctx.globalAlpha = opacity * 0.45; ctx.fillStyle = penColor; ctx.fillRect(x0,y0,rw,rh);
  } else {
    ctx.globalAlpha = opacity; ctx.strokeStyle = penColor; ctx.lineWidth = strokeW;
    ctx.setLineDash([5,4]); ctx.strokeRect(x0,y0,rw,rh);
  }
  ctx.restore();
}

/* ═══════════════════════════════════════════════════════════════════
   TEXT — CREATE & EDIT
═══════════════════════════════════════════════════════════════════ */
function spawnTextInput(pos, pgIdx, editAnnIdx) {
  /* editAnnIdx >= 0 means editing existing annotation */
  var d     = pageData[pgIdx];
  var canvas= d.annCanvas;
  var rect  = canvas.getBoundingClientRect();
  var sx    = rect.width  / canvas.width;
  var sy    = rect.height / canvas.height;
  var isEdit = editAnnIdx >= 0;
  var existing = isEdit ? d.anns[editAnnIdx] : null;

  /* Text position in screen space */
  var screenX, screenY, initText, initFontSize, initColor;
  if (isEdit) {
    screenX     = rect.left + existing.nx * canvas.width  * sx;
    screenY     = rect.top  + (existing.ny - existing.nfont) * canvas.height * sy;
    initText    = existing.text;
    initFontSize= existing.nfont * canvas.width;  /* canvas px */
    initColor   = existing.color;
  } else {
    screenX     = rect.left + pos.x * sx;
    screenY     = rect.top  + pos.y * sy - fontSize * sy;
    initText    = '';
    initFontSize= fontSize * sx;
    initColor   = penColor;
  }

  var ta = document.createElement('textarea');
  ta.className  = 'tinput';
  ta.style.left     = screenX + 'px';
  ta.style.top      = screenY + 'px';
  ta.style.fontSize = initFontSize + 'px';
  ta.style.color    = initColor;
  ta.value          = initText;
  ta.rows = 1;
  document.body.appendChild(ta);

  /* Auto-resize height */
  ta.addEventListener('input', function() {
    ta.style.height = 'auto';
    ta.style.height = ta.scrollHeight + 'px';
  });

  requestAnimationFrame(function() {
    ta.focus();
    ta.select();
  });

  var done = false;
  function commit() {
    if (done) return; done = true;
    var txt = ta.value;     /* preserve whitespace / newlines */
    ta.remove();

    if (isEdit) {
      /* Update existing annotation */
      if (txt.trim()) {
        pushUndo(pgIdx);
        d.anns[editAnnIdx].text  = txt;
      } else {
        /* Deleted all text → remove annotation */
        pushUndo(pgIdx);
        d.anns.splice(editAnnIdx, 1);
        clearSelection();
      }
    } else {
      if (txt.trim()) {
        pushUndo(pgIdx);
        d.anns.push({
          type:  'text',
          nx:    pos.x / canvas.width,
          ny:    pos.y / canvas.height,
          text:  txt,
          nfont: fontSize / canvas.width,
          color: penColor,
          opacity: opacity
        });
      }
    }
    redrawPage(pgIdx);
  }

  ta.addEventListener('blur', commit);
  ta.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      done = true;
      ta.remove();
      redrawPage(pgIdx);
    } else if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      commit();
    }
    // Shift+Enter inserts newline naturally
  });
}

/* Edit existing text annotation */
function editTextAnn(pgIdx, annIdx) {
  var d   = pageData[pgIdx];
  var a   = d.anns[annIdx];
  if (!a || a.type !== 'text') return;
  // pass a dummy pos (not used for editing)
  spawnTextInput(null, pgIdx, annIdx);
}

/* ═══════════════════════════════════════════════════════════════════
   SELECTION
═══════════════════════════════════════════════════════════════════ */
function setSelection(pgIdx, annIdx) {
  // Deselect old page if different
  var oldPg = sel.pgIdx;
  sel.pgIdx  = pgIdx;
  sel.annIdx = annIdx;

  if (oldPg >= 0 && oldPg !== pgIdx && pageData[oldPg]) redrawPage(oldPg);
  redrawPage(pgIdx);

  var a = pageData[pgIdx].anns[annIdx];
  selPanel.classList.remove('hidden');
  /* Show edit button only for text */
  selEditBtn.style.display = (a && a.type === 'text') ? '' : 'none';
}

function clearSelection() {
  var old = sel.pgIdx;
  sel.pgIdx = -1; sel.annIdx = -1; sel.isDragging = false;
  selPanel.classList.add('hidden');
  if (old >= 0 && pageData[old]) redrawPage(old);
}

function deleteSelected() {
  if (sel.pgIdx < 0 || sel.annIdx < 0) return;
  pushUndo(sel.pgIdx);
  pageData[sel.pgIdx].anns.splice(sel.annIdx, 1);
  var pg = sel.pgIdx;
  clearSelection();
  redrawPage(pg);
  showToast('Annotation deleted');
}

/* ═══════════════════════════════════════════════════════════════════
   ERASER
═══════════════════════════════════════════════════════════════════ */
function eraseAt(pos, idx) {
  var hit = hitTest(pos, idx);
  if (hit !== -1) {
    pushUndo(idx);
    pageData[idx].anns.splice(hit, 1);
    redrawPage(idx);
    showToast('Annotation removed');
  }
}

/* ═══════════════════════════════════════════════════════════════════
   UNDO
═══════════════════════════════════════════════════════════════════ */
function pushUndo(idx) {
  undoStack.push({ idx: idx, anns: JSON.parse(JSON.stringify(pageData[idx].anns)) });
  if (undoStack.length > 60) undoStack.shift();
}
function doUndo() {
  if (!undoStack.length) { showToast('Nothing to undo'); return; }
  var s = undoStack.pop();
  pageData[s.idx].anns = s.anns;
  clearSelection();
  redrawPage(s.idx);
  showToast('Undone');
}

/* ═══════════════════════════════════════════════════════════════════
   ZOOM
═══════════════════════════════════════════════════════════════════ */
function adjustZoom(delta) {
  applyZoom(Math.max(0.25, Math.min(4, zoomLevel + delta)));
}
function applyZoom(z) {
  zoomLevel = z;
  zvalEl.textContent = Math.round(z * 100) + '%';
  if (!pjsDoc) return;
  var saved = pageData.map(function(p) {
    return { anns: JSON.parse(JSON.stringify(p.anns || [])) };
  });
  showLoader('Rerendering…');
  renderAllPages().then(function() {
    saved.forEach(function(s, i) {
      if (pageData[i]) { pageData[i].anns = s.anns; redrawPage(i); }
    });
    hideLoader();
  });
}

/* ═══════════════════════════════════════════════════════════════════
   TOOL / COLOUR
═══════════════════════════════════════════════════════════════════ */
function setTool(name) {
  tool = name;
  ['select','text','pen','highlight','rect','eraser'].forEach(function(n) {
    var btn = document.getElementById('t-' + n);
    if (btn) btn.classList.toggle('on', n === name);
  });
  pageData.forEach(function(d) { d.annCanvas.className = 'ann-c cur-' + name; });
  if (name !== 'select') clearSelection();
  updatePropsPanel();
}

function updatePropsPanel() {
  document.getElementById('strokeSec').classList.toggle('hidden', !['pen','rect'].includes(tool));
  document.getElementById('fontSec').classList.toggle('hidden', tool !== 'text');
  document.getElementById('opSec').classList.toggle('hidden', !['pen','highlight','rect','text'].includes(tool));
}

function setColor(c) {
  penColor = c;
  swatchWrap.style.background = c;
  if (c.length === 4) c = '#'+c[1]+c[1]+c[2]+c[2]+c[3]+c[3];
  try { colorPicker.value = c; } catch(e){}
}

/* ═══════════════════════════════════════════════════════════════════
   EXPORT PDF
═══════════════════════════════════════════════════════════════════ */
async function doExport() {
  if (!origBytes) return;
  showLoader('Building PDF…');
  try {
    var pdfDoc    = await PDFLib.PDFDocument.load(origBytes);
    var helvetica = await pdfDoc.embedFont(PDFLib.StandardFonts.Helvetica);
    var pdfPages  = pdfDoc.getPages();

    for (var i = 0; i < pageData.length; i++) {
      var d    = pageData[i];
      var page = pdfPages[i];
      var sz   = page.getSize();
      var pW   = sz.width, pH = sz.height;

      for (var j = 0; j < d.anns.length; j++) {
        var a = d.anns[j];
        try {
          if (a.type === 'path' && a.pts.length >= 2) {
            var col = hexRgb(a.color);
            var lw  = Math.max(a.nw * pW, 0.5);
            for (var k = 1; k < a.pts.length; k++) {
              page.drawLine({
                start: { x: a.pts[k-1].nx * pW, y: (1 - a.pts[k-1].ny) * pH },
                end:   { x: a.pts[k].nx   * pW, y: (1 - a.pts[k].ny)   * pH },
                thickness: lw, color: col, opacity: a.opacity
              });
            }
          } else if (a.type === 'text') {
            var col2 = hexRgb(a.color);
            var fPt  = Math.max(a.nfont * pW, 4);
            var tx   = a.nx * pW;
            var ty   = (1 - a.ny) * pH;
            var lh2  = fPt * 1.3;
            a.text.split('\n').forEach(function(line, li) {
              var py = ty - li * lh2;
              if (line.trim() && py > 0 && py <= pH && tx >= 0 && tx < pW) {
                page.drawText(line, { x:tx, y:py, size:fPt, font:helvetica, color:col2, opacity:a.opacity });
              }
            });
          } else if (a.type === 'highlight') {
            var col3 = hexRgb(a.color);
            page.drawRectangle({
              x: a.nx * pW, y: (1-a.ny-a.nh) * pH,
              width: a.nw * pW, height: a.nh * pH,
              color: col3, opacity: a.opacity
            });
          } else if (a.type === 'rect') {
            var col4 = hexRgb(a.color);
            page.drawRectangle({
              x: a.nx * pW, y: (1-a.ny-a.nh) * pH,
              width: a.nw * pW, height: a.nh * pH,
              borderColor: col4, borderWidth: Math.max(a.nstroke * pW, 0.5),
              opacity: a.opacity
            });
          }
        } catch(annErr) { console.warn('Skipping annotation:', annErr); }
      }
    }

    var bytes = await pdfDoc.save();
    var blob  = new Blob([bytes], { type: 'application/pdf' });
    var url   = URL.createObjectURL(blob);
    var link  = document.createElement('a');
    link.href = url; link.download = 'edited.pdf';
    document.body.appendChild(link); link.click(); document.body.removeChild(link);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 3000);
    hideLoader(); showToast('PDF exported!');
  } catch(err) {
    hideLoader(); showToast('Export failed — check console'); console.error(err);
  }
}

/* ═══════════════════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════════════════ */
function hexRgb(hex) {
  hex = hex.replace('#','');
  if (hex.length === 3) hex = hex.split('').map(function(c){ return c+c; }).join('');
  return PDFLib.rgb(
    parseInt(hex.slice(0,2),16)/255,
    parseInt(hex.slice(2,4),16)/255,
    parseInt(hex.slice(4,6),16)/255
  );
}
function showLoader(msg) { lmsgEl.textContent = msg||'Loading…'; loaderEl.classList.remove('hidden'); }
function hideLoader()    { loaderEl.classList.add('hidden'); }
var toastTimer;
function showToast(msg) {
  toastEl.textContent = msg; toastEl.classList.add('up');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ toastEl.classList.remove('up'); }, 2800);
}
</script>
